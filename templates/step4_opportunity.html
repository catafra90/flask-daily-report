<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Closing - Opportunities</title>
  <style>
    body {
      background-color: #c50075;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .container {
      background-color: white;
      max-width: 800px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 12px;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    .row {
      margin-bottom: 20px;
      border-bottom: 2px solid #c50075;
      padding-bottom: 15px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #aaa;
      margin-top: 5px;
    }
    button {
      margin-top: 30px;
      background-color: #c50075;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #a0005c;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Opportunities</h2>
    <form method="post" id="opportunity-form">
      {% set session_data = session.get('opportunities') %}
      <div id="opportunity-entries">
        {% for i in range(3) %}
        <div class="row">
          <label>Opportunity Name</label>
          <input type="text" name="opportunity_name" value="{{ session_data.opportunity_name[i] if session_data and session_data.opportunity_name|length > i else '' }}">

          <label>Opportunity Provider</label>
          <input type="text" name="opportunity_provider" value="{{ session_data.opportunity_provider[i] if session_data and session_data.opportunity_provider|length > i else '' }}">

          <label>Opportunity Description</label>
          <input type="text" name="opportunity_description" value="{{ session_data.opportunity_description[i] if session_data and session_data.opportunity_description|length > i else '' }}">
        </div>
        {% endfor %}
      </div>

      <button type="button" onclick="addOpportunityRow()">➕ Add Row</button>
      <div class="nav-buttons">
        <a href="/consultations"><button type="button">← Back</button></a>
        <button type="submit">Next →</button>
      </div>
    </form>
  </div>

  <script>
    function addOpportunityRow() {
      const container = document.getElementById('opportunity-entries');
      const div = document.createElement('div');
      div.className = 'row';
      div.innerHTML = `
        <label>Opportunity Name</label>
        <input type="text" name="opportunity_name">

        <label>Opportunity Provider</label>
        <input type="text" name="opportunity_provider">

        <label>Opportunity Description</label>
        <input type="text" name="opportunity_description">
      `;
      container.appendChild(div);
    }
  </script>
</body>
</html>
