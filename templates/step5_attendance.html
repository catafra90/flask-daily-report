<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Closing - Attendance</title>
  <style>
    body {
      background-color: #c50075;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .container {
      background-color: white;
      max-width: 700px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 12px;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }
    input[type="number"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #aaa;
    }
    button {
      margin-top: 30px;
      background-color: #c50075;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #a0005c;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Attendance</h2>
    <form method="post">
      {% set session_data = session.get('attendance') %}
      <label for="attended">Attendances Done</label>
      <input type="number" name="attended" id="attended" value="{{ session_data.attended if session_data else '' }}">

      <label for="no_show">No Show</label>
      <input type="number" name="no_show" id="no_show" value="{{ session_data.no_show if session_data else '' }}">

      <div class="nav-buttons">
        <a href="/opportunities"><button type="button">← Back</button></a>
        <button type="submit">✅ Submit Report</button>
      </div>
    </form>
  </div>
</body>
</html>
