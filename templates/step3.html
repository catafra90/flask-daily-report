{% extends "layout.html" %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-chat-square-dots"></i> Consultations</h2>

<form method="POST">
    <div id="consultation-container">
        {% for i in range(3) %}
        <div class="consultation-block mb-4">
            <div class="mb-2">
                <label>Consultation Name:</label>
                <textarea name="consultation_name" class="form-control" rows="1">{{ consultations.name[i] if consultations.name and i < consultations.name|length else '' }}</textarea>
            </div>
            <div class="mb-2">
                <label>Consultation Outcome:</label>
                <textarea name="consultation_outcome" class="form-control" rows="1">{{ consultations.outcome[i] if consultations.outcome and i < consultations.outcome|length else '' }}</textarea>
            </div>
            <div class="mb-2">
                <label>Consultation Source:</label>
                <textarea name="consultation_source" class="form-control" rows="1">{{ consultations.source[i] if consultations.source and i < consultations.source|length else '' }}</textarea>
            </div>
            <hr>
        </div>
        {% endfor %}
    </div>

    <button type="button" class="btn btn-outline-primary mb-3" id="add-consultation">+ Add</button>

    <div class="d-flex justify-content-between">
        <a href="{{ url_for('step2') }}" class="btn btn-secondary">&larr; Back</a>
        <button type="submit" class="btn btn-primary">Next &rarr;</button>
    </div>
</form>

<script>
document.getElementById("add-consultation").addEventListener("click", function () {
    const container = document.getElementById("consultation-container");
    const block = document.createElement("div");
    block.className = "consultation-block mb-4";
    block.innerHTML = `
        <div class="mb-2">
            <label>Consultation Name:</label>
            <textarea name="consultation_name" class="form-control" rows="1"></textarea>
        </div>
        <div class="mb-2">
            <label>Consultation Outcome:</label>
            <textarea name="consultation_outcome" class="form-control" rows="1"></textarea>
        </div>
        <div class="mb-2">
            <label>Consultation Source:</label>
            <textarea name="consultation_source" class="form-control" rows="1"></textarea>
        </div>
        <hr>
    `;
    container.appendChild(block);
});
</script>
{% endblock %}
